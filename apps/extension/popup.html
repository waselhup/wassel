<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wassel</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:340px;font-family:'Segoe UI',Inter,system-ui,sans-serif;background:#0a0a12;color:#f1f5f9}
    .header{background:linear-gradient(135deg,#7c3aed,#ec4899);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:17px;font-weight:700;color:#fff}
    .header p{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
    .version{font-size:10px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;font-weight:700;color:#fff}
    .content{padding:14px}
    .status-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:500}
    .status-bar.ok{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.3)}
    .status-bar.err{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
    .status-bar.warn{background:rgba(245,158,11,.1);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
    .status-bar.info{background:rgba(124,58,237,.1);color:#c4b5fd;border:1px solid rgba(124,58,237,.3)}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot.green{background:#22c55e}.dot.red{background:#ef4444}.dot.yellow{background:#f59e0b}
    .dot.purple{background:#7c3aed;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* Stats grid */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;text-align:center}
    .stat-value{font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:2px}
    .stat-value.accent{color:#c4b5fd}
    .stat-label{font-size:10px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
    .stat-sub{font-size:10px;color:#475569;margin-top:2px}

    /* Campaign row */
    .campaign-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
    .campaign-name{font-size:12px;font-weight:600;color:#e2e8f0;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .campaign-status{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600}
    .status-active{background:rgba(34,197,94,.12);color:#86efac}
    .status-paused{background:rgba(245,158,11,.12);color:#fcd34d}
    .status-done{background:rgba(100,116,139,.12);color:#94a3b8}

    /* Buttons */
    .btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-secondary{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.08)}
    .btn-secondary:hover{background:rgba(255,255,255,.1)}

    .actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}
    .divider{border-top:1px solid rgba(255,255,255,.06);margin:12px 0}
    .hidden{display:none!important}
    .footer{padding:8px 16px 12px;text-align:center}
    .footer a{color:#a855f7;text-decoration:none;font-size:11px}
    .footer-ver{text-align:center;font-size:10px;color:#334155;padding:4px;border-top:1px solid rgba(255,255,255,.05);margin-top:6px}

    /* Login view */
    .login-prompt{text-align:center;padding:16px 0}
    .login-prompt p{font-size:12px;color:#94a3b8;margin-bottom:12px;line-height:1.6}
    .empty-state{text-align:center;padding:16px 0;color:#475569;font-size:12px}
    .section-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="icons/icon48.png" alt="Wassel" style="width:32px;height:32px;border-radius:50%;">
      <div>
        <h1>Wassel</h1>
        <p>LinkedIn Automation</p>
      </div>
    </div>
    <span class="version">v<span id="ext-version"></span></span>
  </div>

  <div class="content">
    <div id="status" class="status-bar info">
      <span class="dot purple"></span>
      <span id="status-text">Connecting...</span>
    </div>

    <!-- VIEW: Not Connected -->
    <div id="view-login" class="hidden">
      <div class="login-prompt">
        <p>Open the Wassel dashboard and log in to activate the extension.</p>
        <button class="btn btn-primary" id="btn-open-dashboard">🚀 Open Wassel Dashboard</button>
      </div>
      <div class="divider"></div>
      <button class="btn btn-secondary" id="btn-sync">🔄 I'm already logged in — Sync</button>
    </div>

    <!-- VIEW: Connected -->
    <div id="view-connected" class="hidden">

      <!-- Today's action stats -->
      <div class="section-title">Today's Activity</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value accent" id="stat-visits">—</div>
          <div class="stat-label">Profile Visits</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent" id="stat-invites">—</div>
          <div class="stat-label">Invites Sent</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent" id="stat-messages">—</div>
          <div class="stat-label">Messages</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-campaigns">—</div>
          <div class="stat-label">Active Campaigns</div>
        </div>
      </div>

      <!-- Active campaigns -->
      <div class="section-title">Campaigns</div>
      <div id="campaign-list">
        <div class="empty-state">Loading campaigns...</div>
      </div>

      <div class="divider"></div>

      <div class="actions">
        <button class="btn btn-primary" id="btn-dashboard">📊 Open Dashboard</button>
        <button class="btn btn-secondary" id="btn-resync">🔄 Refresh Session</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://wassel-alpha.vercel.app/app/extension" target="_blank">Extension Help</a>
    <div class="footer-ver">Wassel Extension v<span id="ext-version-footer"></span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
