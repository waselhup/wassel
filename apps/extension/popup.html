<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wassel</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:360px;font-family:'Segoe UI',Inter,system-ui,sans-serif;background:#09090b;color:#f1f5f9}

    /* Header */
    .header{background:linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#ec4899 100%);padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .header-left img{width:28px;height:28px;border-radius:8px}
    .header h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .header .subtitle{font-size:10px;color:rgba(255,255,255,.75);margin-top:1px}
    .badge{font-size:9px;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:10px;font-weight:700;color:#fff;backdrop-filter:blur(4px)}

    .content{padding:14px 16px}

    /* Engine Status Banner */
    .engine-banner{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;font-weight:600}
    .engine-banner.running{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80}
    .engine-banner.idle{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);color:#c4b5fd}
    .engine-banner.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
    .engine-banner.offline{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2);color:#94a3b8}
    .engine-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .engine-dot.pulse{animation:pulse 1.5s infinite}
    .engine-banner.running .engine-dot{background:#22c55e}
    .engine-banner.idle .engine-dot{background:#7c3aed}
    .engine-banner.error .engine-dot{background:#ef4444}
    .engine-banner.offline .engine-dot{background:#64748b}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .engine-sub{font-size:10px;font-weight:400;color:#64748b;margin-top:2px}

    /* Stats Row */
    .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px;text-align:center}
    .stat-num{font-size:24px;font-weight:800;background:linear-gradient(135deg,#c4b5fd,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .stat-label{font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

    /* Last Action */
    .last-action{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;margin-bottom:14px}
    .la-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .la-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
    .la-time{font-size:10px;color:#475569}
    .la-body{font-size:12px;color:#cbd5e1;line-height:1.5}
    .la-body .name{color:#c4b5fd;font-weight:600}
    .la-body .type{color:#a78bfa}
    .la-empty{font-size:11px;color:#475569;text-align:center;padding:4px 0}

    /* Cookie Status */
    .cookie-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:14px;font-size:12px;font-weight:500}
    .cookie-bar.valid{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:#86efac}
    .cookie-bar.invalid{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:#fca5a5}
    .cookie-bar.checking{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);color:#c4b5fd}
    .cookie-icon{font-size:14px}

    /* Buttons */
    .actions{display:flex;flex-direction:column;gap:8px}
    .btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:-.2px}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn:active:not(:disabled){transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
    .btn-primary:hover:not(:disabled){opacity:.9}
    .btn-ghost{background:rgba(255,255,255,.04);color:#94a3b8;border:1px solid rgba(255,255,255,.06)}
    .btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.08);color:#e2e8f0}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

    .divider{border:none;border-top:1px solid rgba(255,255,255,.05);margin:14px 0}
    .hidden{display:none!important}

    /* Login View */
    .login-view{text-align:center;padding:20px 0}
    .login-icon{font-size:36px;margin-bottom:10px}
    .login-text{font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:16px;padding:0 8px}

    /* Footer */
    .footer{padding:8px 16px 10px;text-align:center;border-top:1px solid rgba(255,255,255,.04)}
    .footer a{color:#7c3aed;text-decoration:none;font-size:10px;font-weight:500}
    .footer a:hover{text-decoration:underline}
    .footer-ver{font-size:9px;color:#27272a;margin-top:4px}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.png" alt="Wassel">
      <div>
        <h1>Wassel</h1>
        <div class="subtitle">LinkedIn Automation Engine</div>
      </div>
    </div>
    <span class="badge">v<span id="ext-ver"></span></span>
  </div>

  <div class="content">
    <!-- ENGINE STATUS -->
    <div id="engine-banner" class="engine-banner offline">
      <span class="engine-dot"></span>
      <div>
        <div id="engine-text">Initializing...</div>
        <div id="engine-sub" class="engine-sub"></div>
      </div>
    </div>

    <!-- VIEW: Not Connected -->
    <div id="view-login" class="hidden">
      <div class="login-view">
        <div class="login-icon">🔗</div>
        <div class="login-text">Open the Wassel dashboard and log in.<br>The extension will connect automatically.</div>
        <button class="btn btn-primary" id="btn-open-dash">Open Wassel Dashboard</button>
        <div style="height:8px"></div>
        <button class="btn btn-ghost" id="btn-sync-login">Sync Connection</button>
      </div>
    </div>

    <!-- VIEW: Connected -->
    <div id="view-main" class="hidden">
      <!-- Today Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="s-actions">0</div>
          <div class="stat-label">Actions</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-errors">0</div>
          <div class="stat-label">Errors</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="s-streak">0</div>
          <div class="stat-label">Streak</div>
        </div>
      </div>

      <!-- Last Action -->
      <div class="last-action">
        <div class="la-header">
          <span class="la-title">Last Action</span>
          <span class="la-time" id="la-time"></span>
        </div>
        <div id="la-body" class="la-body">
          <div class="la-empty">No actions yet — waiting for campaign</div>
        </div>
      </div>

      <!-- Cookie Status -->
      <div id="cookie-bar" class="cookie-bar checking">
        <span class="cookie-icon">🔑</span>
        <span id="cookie-text">Checking LinkedIn session...</span>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" id="btn-force-exec">▶ Execute Next Action Now</button>
        <div class="btn-row">
          <button class="btn btn-ghost" id="btn-dashboard">Dashboard</button>
          <button class="btn btn-ghost" id="btn-refresh-cookie">Refresh Cookie</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://wassel-alpha.vercel.app/app" target="_blank">wassel-alpha.vercel.app</a>
    <div class="footer-ver">Wassel Extension v<span id="ext-ver-f"></span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
