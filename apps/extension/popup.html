<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Wassel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 340px;
            font-family: 'Segoe UI', Inter, sans-serif;
            background: #f8fafc;
        }

        .header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 16px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .header p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
        }

        .content {
            padding: 16px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .status.ok {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status.err {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status.pending {
            background: #fffbeb;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.green {
            background: #10b981;
        }

        .dot.red {
            background: #ef4444;
        }

        .dot.yellow {
            background: #f59e0b;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .field input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
        }

        .field input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 12px 0;
        }

        .footer {
            padding: 12px 16px;
            text-align: center;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }

        .info {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>⚡ Wassel</h1>
        <p>LinkedIn Prospect Importer</p>
    </div>

    <div class="content">
        <!-- Connection Status -->
        <div id="status-box" class="status pending">
            <span class="dot yellow"></span>
            <span id="status-text">Checking connection...</span>
        </div>

        <!-- Config Section (shown when not configured) -->
        <div id="config-section">
            <div class="field">
                <label>API Token (from Wassel Dashboard)</label>
                <input type="password" id="api-token" placeholder="Paste your Supabase JWT token">
            </div>
            <div class="field">
                <label>Client ID (optional)</label>
                <input type="text" id="client-id" placeholder="UUID of the client account">
            </div>
            <button class="btn btn-primary" id="save-btn">Save & Connect</button>
        </div>

        <!-- Connected Section (shown when configured) -->
        <div id="connected-section" class="hidden">
            <div class="actions">
                <button class="btn btn-primary" id="open-linkedin-btn">🔍 Open LinkedIn Search</button>
                <button class="btn btn-secondary" id="test-btn">🔌 Test Connection</button>
                <button class="btn btn-secondary" id="dashboard-btn">📊 Open Dashboard</button>
            </div>
            <div class="divider"></div>
            <button class="btn btn-secondary" id="disconnect-btn" style="color: #dc2626;">Disconnect</button>
        </div>
    </div>

    <div class="footer">
        <a href="https://wassel-alpha.vercel.app/extension" target="_blank">Extension Help & Setup Guide</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
