<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Wassel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 340px;
            font-family: 'Segoe UI', Inter, sans-serif;
            background: #0a0a12;
            color: #f1f5f9;
        }

        .header {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            padding: 16px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .header p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
        }

        .content {
            padding: 16px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .status.ok {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.err {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status.syncing {
            background: rgba(124, 58, 237, 0.1);
            color: #c4b5fd;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.green { background: #22c55e; }
        .dot.red { background: #ef4444; }
        .dot.yellow { background: #f59e0b; }
        .dot.purple { background: #7c3aed; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .divider {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin: 12px 0;
        }

        .footer {
            padding: 12px 16px;
            text-align: center;
        }

        .footer a {
            color: #a855f7;
            text-decoration: none;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }

        .info {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            text-align: center;
        }

        .login-prompt {
            text-align: center;
            padding: 20px 0;
        }

        .login-prompt p {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>⚡ Wassel</h1>
        <p>LinkedIn Prospect Importer</p>
    </div>

    <div class="content">
        <!-- Connection Status -->
        <div id="status-box" class="status syncing">
            <span class="dot purple"></span>
            <span id="status-text">Connecting to dashboard...</span>
        </div>

        <!-- Not Logged In Section -->
        <div id="login-section" class="hidden">
            <div class="login-prompt">
                <p>Open the Wassel dashboard and log in to automatically connect the extension.</p>
                <button class="btn btn-primary" id="open-dashboard-btn">🚀 Open Wassel Dashboard</button>
                <div class="info">After logging in, click the sync button below.</div>
            </div>
            <div class="divider"></div>
            <button class="btn btn-secondary" id="retry-sync-btn">🔄 Sync Now</button>
        </div>

        <!-- Connected Section -->
        <div id="connected-section" class="hidden">
            <div class="actions">
                <button class="btn btn-primary" id="open-linkedin-btn">🔍 Open LinkedIn Search</button>
                <button class="btn btn-secondary" id="test-btn">🔌 Test Connection</button>
                <button class="btn btn-secondary" id="dashboard-btn">📊 Open Dashboard</button>
            </div>
            <div class="divider"></div>
            <button class="btn btn-secondary" id="resync-btn">🔄 Refresh Session</button>
        </div>
    </div>

    <div class="footer">
        <a href="https://wassel-alpha.vercel.app/app/extension" target="_blank">Extension Help & Setup</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
