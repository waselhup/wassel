name: Verify Deployment

on:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build check
        run: pnpm run build

      - name: Verify bundle contains Supabase key
        run: |
          # Vite now emits multiple index-*.js chunks (code-splitting).
          # We grep across all of them; finding the URL in any chunk is enough.
          INDEX_COUNT=$(ls dist/assets/index-*.js 2>/dev/null | wc -l)
          if [ "$INDEX_COUNT" -lt 1 ]; then
            echo "❌ No index-*.js files found in dist/assets/"
            exit 1
          fi
          echo "Found $INDEX_COUNT index chunk(s)"
          if grep -q "hiqotmimlgsrsnovtopd" dist/assets/index-*.js; then
            echo "✅ Supabase URL found in bundle"
          else
            echo "❌ Supabase URL MISSING from all $INDEX_COUNT bundle(s)"
            exit 1
          fi

      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Verify live site
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://wassel-alpha.vercel.app")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ wassel-alpha.vercel.app is live"
          else
            echo "⚠️ Site returned HTTP $STATUS (Vercel may still be deploying)"
          fi
