name: Verify Deployment

on:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build check
        run: npm run build
      - name: Verify bundle contains Supabase key
        run: |
          KEY_FILE=$(ls dist/assets/index-*.js)
          if grep -q "hiqotmimlgsrsnovtopd" "$KEY_FILE"; then
            echo "✅ Supabase URL found in bundle"
          else
            echo "❌ Supabase URL MISSING from bundle"
            exit 1
          fi

      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Verify live site
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://wassel-alpha.vercel.app")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ wassel-alpha.vercel.app is live"
          else
            echo "⚠️ Site returned HTTP $STATUS (Vercel may still be deploying)"
          fi