<svg width="512" height="512" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Outer soft teal ring -->
  <circle cx="40" cy="40" r="32" stroke="#99f6e4" stroke-width="3" fill="none" opacity="0.45"/>
  <!-- Active arc -->
  <circle cx="40" cy="40" r="32" stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-dasharray="48 200" fill="none" transform="rotate(-90 40 40)"/>
  <!-- Center filled core -->
  <circle cx="40" cy="40" r="14" fill="url(#g)"/>
  <!-- Gold accent dot -->
  <circle cx="62" cy="18" r="3.5" fill="#C9922A"/>
</svg>
